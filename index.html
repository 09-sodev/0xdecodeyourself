<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>0xDecodeYourself</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a0a;
            --surface:   #111111;
            --border:    rgba(255,255,255,0.08);
            --border2:   rgba(255,255,255,0.18);
            --accent:    #C4607A;
            --accent-soft: rgba(196,96,122,0.12);
            --glow:      rgba(196,96,122,0.22);
            --text:      #f2f2f2;
            --muted:     #666666;
            --secondary: #a0a0a0;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #333; }
        ::-webkit-scrollbar-thumb { background: #777; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        ::-moz-selection { color: #fff; background: var(--accent); }
        ::selection { color: #fff; background: var(--accent); }

        html, body {
            min-height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-weight: 400;
            letter-spacing: 0.005em;
            -webkit-text-size-adjust: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: clamp(1.5rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem);
            overflow-x: hidden;
        }

        /* Background grid */
        .bg-grid {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 64px 64px;
        }

        /* Pink vignette orbs */
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; }
        .orb-1 { width: 600px; height: 600px; background: rgba(196,96,122,0.07); top: -220px; right: -180px; }
        .orb-2 { width: 420px; height: 420px; background: rgba(196,96,122,0.04); bottom: -140px; left: -140px; }

        /* Content */
        .splash {
            position: relative; z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 960px;
            padding: 0 0.5rem;
        }

        .badge {
            display: inline-flex; align-items: center; gap: 0.55rem;
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 100px;
            padding: 0.42rem 1.05rem;
            font-size: 0.68rem; font-weight: 500;
            letter-spacing: 0.16em; text-transform: lowercase;
            color: var(--accent);
            margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
            font-family: 'Poppins', 'Inter', sans-serif;
        }
        .badge-dot {
            width: 6px; height: 6px;
            background: var(--accent); border-radius: 50%;
            animation: pulse 2.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%     { opacity:0.35; transform:scale(1.55); }
        }

        /* Headline — sized down so "0xdecodeyourself" always fits on one line */
        .headline {
            font-family: 'Poppins', 'Inter', sans-serif;
            font-size: clamp(1.5rem, 7.5vw, 3.75rem);
            font-weight: 600;
            line-height: 1;
            letter-spacing: -0.03em;
            color: var(--text);
            text-transform: lowercase;
            margin-bottom: clamp(1rem, 3vw, 1.6rem);
            white-space: nowrap;
        }

        .headline .prefix {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: -0.02em;
            text-transform: none;
        }

        .subheadline {
            font-size: clamp(0.9rem, 2.2vw, 1.02rem);
            color: var(--secondary);
            line-height: 1.7;
            font-weight: 300;
            max-width: 520px;
            margin: 0 auto;
            padding: 0 0.5rem;
        }

        .splash-footer {
            position: absolute;
            bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
            left: 0; right: 0;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: lowercase;
            font-family: 'Poppins', sans-serif;
            z-index: 1;
            padding: 0 1rem;
        }

        /* Tablet */
        @media (max-width: 768px) {
            .orb-1 { width: 400px; height: 400px; top: -160px; right: -120px; }
            .orb-2 { width: 300px; height: 300px; bottom: -100px; left: -100px; }
        }

        /* Mobile */
        @media (max-width: 520px) {
            .orb { filter: blur(80px); }
            .bg-grid { background-size: 48px 48px; }
            .badge { font-size: 0.62rem; padding: 0.38rem 0.9rem; }
        }

        /* Landscape phones */
        @media (max-height: 480px) and (orientation: landscape) {
            .badge { margin-bottom: 1rem; }
            .splash-footer { position: static; margin-top: 1.5rem; }
            body { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="splash">
        <div class="badge">
            <div class="badge-dot"></div>
            Coming Soon
        </div>

        <h1 class="headline"><span class="prefix">0x</span>decodeyourself</h1>

        <p class="subheadline">
            A career clarity program for recent graduates.
        </p>
    </div>

    <div class="splash-footer">© 2026 - All Rights Reserved</div>

</body>
</html>
